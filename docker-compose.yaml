services:
  api:
    build: .
    ports:
      - "8001:3000"
    env_file:
      - .env
    depends_on:
      mongo:
        condition: service_healthy
  
  mongo:
    image: mongo:8.2.5
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5      

volumes:
  mongo_data: